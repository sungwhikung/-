<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; padding: 20px; margin: 0; 
        }
        .container { 
            max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 300px; gap: 20px; 
        }
        .board-wrap { 
            background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        #myBoard { width: 100%; }
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; }
        #status { margin: 0 0 15px 0; color: var(--accent); font-size: 1.2rem; text-align: center; }
        select, button { 
            width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; 
        }
        select { background: var(--bg); color: white; border: 1px solid #334155; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-s { background: #475569; color: white; }
        button:hover { filter: brightness(1.1); }
        #pgn-log { 
            background: var(--bg); height: 120px; padding: 10px; border-radius: 6px; 
            font-family: monospace; font-size: 0.85rem; overflow-y: auto; color: #94a3b8; 
        }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="board-wrap">
        <div id="myBoard"></div>
    </div>
    
    <div class="sidebar">
        <div class="panel">
            <h2 id="status">로딩 중...</h2>
            <label>AI 난이도</label>
            <select id="difficulty">
                <option value="3">초보</option>
                <option value="10" selected>중급</option>
                <option value="15">상급</option>
            </select>
            <button id="resetBtn" class="btn-p">새 게임 시작</button>
            <button id="undoBtn" class="btn-s">한 수 물리기</button>
        </div>
        <div class="panel">
            <div id="pgn-log">기보가 여기에 표시됩니다.</div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
    // 문서가 완전히 다 읽힌 후에 실행 (1003 에러 완벽 차단)
    $(document).ready(function() {
        var board = null;
        var game = new Chess();
        var engine = null;

        // 체스말 이미지 경로
        function pieceTheme(piece) {
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        // AI 엔진 로드
        fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js')
            .then(res => res.text())
            .then(text => {
                const blob = new Blob([text], { type: 'application/javascript' });
                engine = new Worker(URL.createObjectURL(blob));
                engine.postMessage('uci');
                engine.onmessage = function(e) {
                    if (e.data.includes('bestmove')) {
                        const moveStr = e.data.split(' ')[1];
                        game.move({ from: moveStr.substring(0, 2), to: moveStr.substring(2, 4), promotion: 'q' });
                        board.position(game.fen());
                        updateStatus();
                    }
                };
            });

        // 룰 설정
        function onDragStart(source, piece) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            
            // AI 턴
            window.setTimeout(function() {
                engine.postMessage('position fen ' + game.fen());
                engine.postMessage('go depth ' + $('#difficulty').val());
            }, 250);
        }

        function updateStatus() {
            var status = game.turn() === 'w' ? "당신의 차례입니다" : "AI가 생각 중입니다...";
            if (game.in_checkmate()) status = "체크메이트! 게임 종료";
            else if (game.in_draw()) status = "무승부!";
            $('#status').text(status);
            $('#pgn-log').text(game.pgn());
        }

        // 보드 생성
        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: () => board.position(game.fen()),
            pieceTheme: pieceTheme
        });

        updateStatus();

        // 버튼 이벤트
        $('#resetBtn').on('click', function() { game.reset(); board.start(); updateStatus(); });
        $('#undoBtn').on('click', function() { game.undo(); game.undo(); board.position(game.fen()); updateStatus(); });
    });
</script>
</body>
</html>
